<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Sign Up — Admission Portal</title>
</head>
<body>

<nav class="navbar">
    <a class="brand" href="/">🎓 AdmissionPortal <span>Sign Up</span></a>
</nav>

<div class="page center">
    <div class="card">
        <div class="card-header">
            <div class="card-icon">✨</div>
            <h2>Create Account</h2>
            <p>Register to start your admission process</p>
        </div>

        <div id="alert" class="alert"></div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Minimum 6 characters">
        </div>

        <button class="btn btn-primary" onclick="signup()" id="signupBtn">
            Create Account
        </button>

        <div class="auth-footer">
            Already have an account? <a href="/">Sign in</a>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBDI4oYWe9PLc9T4pkAIy_qE8YKd5c1m4k",
    authDomain: "admissionform-4ecb3.firebaseapp.com",
    projectId: "admissionform-4ecb3",
    storageBucket: "admissionform-4ecb3.firebasestorage.app",
    messagingSenderId: "273142872764",
    appId: "1:273142872764:web:da50f75584920d8087eeb9",
    measurementId: "G-55Z81KGW9M"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function showAlert(msg, type) {
    const el = document.getElementById("alert");
    el.textContent = msg;
    el.className = "alert show " + type;
}

window.signup = function () {
    const emailVal = document.getElementById("email").value.trim();
    const passVal  = document.getElementById("password").value;
    const btn = document.getElementById("signupBtn");

    if (!emailVal || !passVal) {
        showAlert("Please fill in all fields.", "error");
        return;
    }

    // Validate email format
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(emailVal)) {
        showAlert("Please enter a valid email address.", "error");
        return;
    }

    // Validate password length (Firebase requires minimum 6 characters)
    if (passVal.length < 6) {
        showAlert("Password must be at least 6 characters long.", "error");
        return;
    }

    btn.innerHTML = '<span class="spinner"></span> Creating account…';
    btn.disabled = true;

    createUserWithEmailAndPassword(auth, emailVal, passVal)
        .then(() => {
            showAlert("Account created! Redirecting to login…", "success");
            setTimeout(() => window.location = "/", 1500);
        })
        .catch(err => {
            showAlert(err.message || "Signup failed. Try again.", "error");
            btn.innerHTML = "Create Account";
            btn.disabled = false;
        });
};
</script>
</body>
</html>
