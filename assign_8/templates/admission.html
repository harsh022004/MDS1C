<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Admission Form — Admission Portal</title>
</head>
<body>

<nav class="navbar">
    <a class="brand" href="/admission">🎓 AdmissionPortal <span>Form</span></a>
    <div class="nav-right">
        <span>👤 {{ user }}</span>
        <a href="/result">View Records</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="page">
    <div class="card wide">
        <div class="card-header">
            <div class="card-icon">📋</div>
            <h2>College Admission Form</h2>
            <p>Fill in all required fields to submit your application</p>
        </div>

        <form method="POST" action="/admission">

            <!-- Personal Details -->
            <div class="form-section">
                <div class="section-title">👤 Personal Details</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" name="name" placeholder="e.g. Rahul Sharma" required>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth *</label>
                        <input type="date" name="dob" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Gender *</label>
                    <select name="gender" required>
                        <option value="" disabled selected>Select gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                        <option>Prefer not to say</option>
                    </select>
                </div>
            </div>

            <!-- Contact Details -->
            <div class="form-section">
                <div class="section-title">📞 Contact Details</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" name="phone" placeholder="10-digit mobile number" required>
                    </div>
                    <div class="form-group">
                        <label>Alternate Email</label>
                        <input type="email" name="alt_email" placeholder="Optional alternate email">
                    </div>
                </div>
                <div class="form-group">
                    <label>Full Address *</label>
                    <input type="text" name="address" placeholder="House No., Street, Area" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City *</label>
                        <input type="text" name="city" placeholder="City" required>
                    </div>
                    <div class="form-group">
                        <label>State *</label>
                        <input type="text" name="state" placeholder="State" required>
                    </div>
                </div>
                <div class="form-group" style="max-width:200px">
                    <label>Pincode *</label>
                    <input type="text" name="pincode" placeholder="6-digit pincode" required>
                </div>
            </div>

            <!-- Academic Details -->
            <div class="form-section">
                <div class="section-title">🎓 Academic Details</div>
                <div class="form-group">
                    <label>Course Applied For *</label>
                    <input type="text" name="course" placeholder="e.g. B.Tech Computer Science" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Previous College / School</label>
                        <input type="text" name="college_name" placeholder="Institution name">
                    </div>
                    <div class="form-group">
                        <label>Board *</label>
                        <input type="text" name="board" placeholder="e.g. CBSE / State Board" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Passing Year *</label>
                        <input type="text" name="passing_year" placeholder="e.g. 2024" required>
                    </div>
                    <div class="form-group">
                        <label>Percentage / CGPA *</label>
                        <input type="text" name="percentage" placeholder="e.g. 85.4%" required>
                    </div>
                </div>
            </div>

            <!-- Family Details -->
            <div class="form-section">
                <div class="section-title">👨‍👩‍👧 Family Details</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Father's Name *</label>
                        <input type="text" name="father_name" placeholder="Father's full name" required>
                    </div>
                    <div class="form-group">
                        <label>Mother's Name *</label>
                        <input type="text" name="mother_name" placeholder="Mother's full name" required>
                    </div>
                </div>
                <div class="form-group" style="max-width:280px">
                    <label>Parent Contact *</label>
                    <input type="tel" name="parent_contact" placeholder="Parent's phone number" required>
                </div>
            </div>

            <!-- Other Details -->
            <div class="form-section">
                <div class="section-title">📄 Other Details</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Aadhaar Number</label>
                        <input type="text" name="aadhaar" placeholder="12-digit Aadhaar (optional)">
                    </div>
                    <div class="form-group">
                        <label>Nationality</label>
                        <input type="text" name="nationality" placeholder="e.g. Indian">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="font-size:1rem; padding:13px;">
                🚀 Submit Admission Application
            </button>
        </form>
    </div>
</div>

</body>
</html>
