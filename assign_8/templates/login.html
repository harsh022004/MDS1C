<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Login — Admission Portal</title>
</head>
<body>

<nav class="navbar">
    <a class="brand" href="/">🎓 AdmissionPortal <span>Login</span></a>
</nav>

<div class="page center">
    <div class="card">
        <div class="card-header">
            <div class="card-icon">🔐</div>
            <h2>Welcome Back</h2>
            <p>Sign in to your student account</p>
        </div>

        <div id="alert" class="alert"></div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <button class="btn btn-primary" onclick="login()" id="loginBtn">
            Sign In
        </button>

        <div class="auth-footer">
            Don't have an account? <a href="/signup">Create one</a>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBDI4oYWe9PLc9T4pkAIy_qE8YKd5c1m4k",
    authDomain: "admissionform-4ecb3.firebaseapp.com",
    projectId: "admissionform-4ecb3",
    storageBucket: "admissionform-4ecb3.firebasestorage.app",
    messagingSenderId: "273142872764",
    appId: "1:273142872764:web:da50f75584920d8087eeb9",
    measurementId: "G-55Z81KGW9M"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function showAlert(msg, type) {
    const el = document.getElementById("alert");
    el.textContent = msg;
    el.className = "alert show " + type;
}

window.login = function () {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("loginBtn");

    if (!email || !password) {
        showAlert("Please enter email and password.", "error");
        return;
    }

    btn.innerHTML = '<span class="spinner"></span> Signing in…';
    btn.disabled = true;

    signInWithEmailAndPassword(auth, email, password)
        .then(user => user.user.getIdToken())
        .then(token => fetch("/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token })
        }))
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                window.location = "/admission";
            } else {
                throw new Error("Token verification failed.");
            }
        })
        .catch(err => {
            showAlert(err.message || "Login failed. Please try again.", "error");
            btn.innerHTML = "Sign In";
            btn.disabled = false;
        });
};
</script>
</body>
</html>
